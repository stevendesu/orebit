# Orebit swim-course bot capabilities (copied to run/swim/config/orebit.properties by run-swim.ps1).
# The point of this run is to isolate SWIMMING EXECUTION, so the config removes every other way across water:
#
#   * placement OFF and mining OFF  -> the bot cannot bridge over or dig around water; the ONLY route across
#     a tank is to swim it (and the ONLY way out is to surface + climb). If the planner offers no swim route
#     at all, that shows up as a distinct 'nav gave up' outcome.
#   * takesDamage ON -> a downward (magma) bubble column that drags the bot onto the magma deals real damage,
#     so the hazard the planner prices is the hazard the bot actually faces.
#   * needsBreath OFF -> a genuinely-slow-but-working deep swim is never drowned mid-diagnosis; a bot stuck
#     underwater shows as a flat trace + timeout, NOT a drowning death, keeping 'stuck' and 'slow' distinct.
#   * hunger OFF -> sprint (and thus sprint-swim) is always available; the question is the follower, not food.
#   * async OFF -> deterministic, reproducible search (the autotest/parkour rationale).

survival.takesDamage=true
survival.hunger=false
survival.needsBreath=false

placement.canPlace=false
mining.canMine=false

pathing.async=false
