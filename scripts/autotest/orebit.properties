# Orebit autotest bot capabilities (copied to run/autotest/config/orebit.properties by run-autotest.ps1;
# read by ConfigLoader at SERVER_STARTED — <runDir>/config/orebit.properties via the ConfigDir seam).
# Owner-specified scenario: mortal bot, mining + placement allowed, modest edit reluctance (=10) so
# dig-routes are discouraged but not forbidden. Every key not listed keeps its Config.DEFAULT.

# --- survival: a mortal bot (fall/hazard damage is real; planner prices it via costPerHitpoint) ---
survival.takesDamage=true
survival.hunger=false
survival.needsBreath=false

# --- placement: allowed; conjured-block mode (default) so "one pickaxe, nothing else" can still bridge ---
placement.canPlace=true
placement.consumesBlocks=false
placement.conjuredBlock=minecraft:cobblestone
# Owner scenario: ~10 ticks flat reluctance per placement (default 6.0).
placement.placeBaseCost=10.0

# --- mining: allowed with the carried stone pickaxe; modest per-break reluctance ---
mining.canMine=true
mining.consumesTools=false
# Owner scenario: ~10 ticks flat surcharge per planned break (default 0.0) — discourages dig-routes.
mining.breakBaseCost=10.0

# --- pathing: force SYNC search for run-to-run reproducibility (pathing.async defaults TRUE for real
# servers — larger effective node budget; async replan timing made the E2E route nondeterministic).
pathing.async=false
