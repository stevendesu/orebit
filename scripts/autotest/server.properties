# Orebit headless autotest — deterministic world (copied into run/autotest/ by scripts/run-autotest.ps1).
# The seed is the scenario contract: jungle-tree start (-3,125,-28) -> trial-chamber goal (201,-28,90).
level-seed=-6453171316297072906
level-type=minecraft\:normal
level-name=world

# No real clients ever join this server; the bot is a server-side PlayerList member.
online-mode=false
white-list=false
max-players=4
motd=Orebit autotest

# DECISION: peaceful isolates NAVIGATION from trial-chamber combat (mobs killing a takesDamage bot is
# not a movement pathology). Flip to `normal` for a combat-exposed variant of the run.
difficulty=peaceful
gamemode=survival
force-gamemode=false

# The bot's own player chunk tickets do the corridor loading (ChunkMap.skipPlayer skips spectators only);
# 12 keeps terrain + nav-grid builds comfortably ahead of a walking bot.
view-distance=12
simulation-distance=10

# The bot digs/places along its route; spawn protection must never veto edits near worldspawn.
spawn-protection=0

# Watchdog OFF: a long sync search or a slow first-generation tick must abort the TEST (its own budget),
# never hard-kill the server mid-run.
max-tick-time=-1

# Defensive: the empty-server tick pause must never engage (the bot joins within the first tick, and it
# IS a PlayerList member; unknown key is ignored on versions that predate it).
pause-when-empty-seconds=-1

# Irrelevant-but-quiet defaults
enable-rcon=false
enable-status=false
snooper-enabled=false
spawn-npcs=true
spawn-animals=true
generate-structures=true
allow-nether=true
sync-chunk-writes=false
