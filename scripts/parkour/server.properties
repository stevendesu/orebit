# Orebit parkour-course headless run (copied into run/parkour/ by scripts/run-parkour.ps1).
# A FLAT world: the ParkourCourse harness builds its obstacle course from blocks at y=150, floating ~200
# blocks above the superflat floor, so a missed jump falls to its death (an unambiguous FAIL). The terrain
# itself is irrelevant to the test — flat just keeps worldgen cheap and deterministic.
level-type=minecraft\:flat
level-name=world

# No real clients ever join; the bot is a server-side PlayerList member.
online-mode=false
white-list=false
max-players=4
motd=Orebit parkour course

# Peaceful: no mobs to knock a takesDamage bot off a ledge (that would be a combat outcome, not a movement
# pathology). No structures: the course is the only thing that matters and structures just cost gen time.
difficulty=peaceful
gamemode=survival
force-gamemode=false
generate-structures=false

# The course is a compact grid near spawn; 14 keeps the whole grid loaded + nav-built regardless of which
# tile the bot is teleported to (the long linear course left far tiles unbuilt).
view-distance=14
simulation-distance=10
spawn-protection=0

# Watchdog OFF: a slow first-gen tick must never hard-kill the server mid-run (the harness owns its budget).
max-tick-time=-1
# The empty-server tick pause must never engage (the bot joins within the first tick).
pause-when-empty-seconds=-1

# Irrelevant-but-quiet defaults
enable-rcon=false
enable-status=false
snooper-enabled=false
spawn-npcs=false
spawn-animals=false
allow-nether=false
sync-chunk-writes=false
