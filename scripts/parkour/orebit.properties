# Orebit parkour-course bot capabilities (copied to run/parkour/config/orebit.properties by
# run-parkour.ps1). The point of this run is to isolate PARKOUR EXECUTION, so the config removes every
# other way across a gap:
#
#   * placement OFF and mining OFF  -> the bot cannot bridge or dig a gap; the ONLY route across is a jump,
#     so a missed landing can never be masked by a dig/bridge detour (and if the planner offers no jump at
#     all, that shows up as a distinct 'nav gave up' outcome).
#   * takesDamage ON -> a missed jump falls ~200 blocks and dies, an unambiguous FAIL.
#   * hunger OFF -> sprint is always available (vanilla cancels sprint below ~6 food); the takeoff-speed
#     question is about the ONE-BLOCK runup, not food state.
#   * async OFF -> deterministic, reproducible search (the autotest rationale).

survival.takesDamage=true
survival.hunger=false
survival.needsBreath=false

placement.canPlace=false
mining.canMine=false

pathing.async=false
