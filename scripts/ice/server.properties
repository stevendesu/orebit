# Orebit ice-course headless run (copied into run/ice/ by scripts/run-ice.ps1).
# A FLAT world: the IceCourse harness builds a grid of blue-ice paths (with lava-curtain walls) from blocks at
# y=150, floating well above the superflat floor, so the lava curtains drain straight down into deep void (and
# never pool onto the path). The terrain itself is irrelevant — flat just keeps worldgen cheap and deterministic.
level-type=minecraft\:flat
level-name=world

# No real clients ever join; the bot is a server-side PlayerList member.
online-mode=false
white-list=false
max-players=4
motd=Orebit ice course

# Peaceful: no mobs to knock a bot off course (that would be a combat outcome, not a movement pathology).
# No structures: the course is the only thing that matters and structures just cost gen time.
difficulty=peaceful
gamemode=survival
force-gamemode=false
generate-structures=false

# The course is a compact grid near spawn; 14 keeps the whole grid loaded + nav-built regardless of which
# tile the bot is teleported to.
view-distance=14
simulation-distance=10
spawn-protection=0

# Watchdog OFF: a slow first-gen tick must never hard-kill the server mid-run (the harness owns its budget).
max-tick-time=-1
# The empty-server tick pause must never engage (the bot joins within the first tick).
pause-when-empty-seconds=-1

# Irrelevant-but-quiet defaults
enable-rcon=false
enable-status=false
snooper-enabled=false
spawn-npcs=false
spawn-animals=false
allow-nether=false
sync-chunk-writes=false
