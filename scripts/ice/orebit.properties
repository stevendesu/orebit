# Orebit ice-course bot capabilities (copied to run/ice/config/orebit.properties by run-ice.ps1).
# The point of this run is to isolate GROUND-MOVEMENT overshoot on near-frictionless (blue ice) paths, so the
# config removes every other way across and makes the lava lethal:
#
#   * placement OFF and mining OFF  -> the bot cannot bridge over or dig around the lava-curtain walls; the
#     ONLY route is the 1-wide blue-ice path. If the planner offers no route at all, that shows up as a
#     distinct 'nav gave up' outcome.
#   * takesDamage ON -> lava is damaging, so (a) the planner AVOIDS every off-path cell (the ice is the only
#     route) and (b) a momentum-overshoot slide off the path into the flank lava actually KILLS the bot -> an
#     unambiguous FAIL. Without this the whole reproduction is invisible.
#   * needsBreath OFF -> irrelevant here (no water); mirror the sibling courses.
#   * hunger OFF -> sprint is always available; the question is the follower/steering, not food state.
#   * async OFF -> deterministic, reproducible search (the autotest/parkour/swim rationale).

survival.takesDamage=true
survival.hunger=false
survival.needsBreath=false

placement.canPlace=false
mining.canMine=false

pathing.async=false
