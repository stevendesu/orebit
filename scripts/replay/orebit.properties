# Orebit world-replay bot capabilities (copied to run/replay/config/orebit.properties by run-replay.ps1).
# Mirrors the swim-course config exactly, so the REAL-world replay runs under the same constraints the
# synthetic SwimCourse passes under — the ONLY route across water is to swim it:
#
#   * placement OFF and mining OFF  -> the bot cannot bridge over or dig around water; it must swim.
#   * takesDamage ON -> hazards the planner prices are the hazards the bot actually faces.
#   * needsBreath OFF -> a slow-but-working deep swim is never drowned mid-diagnosis (stuck vs slow stay distinct).
#   * hunger OFF -> sprint (and thus sprint-swim) is always available; the question is the follower.
#   * async OFF -> deterministic, reproducible search.

survival.takesDamage=true
survival.hunger=false
survival.needsBreath=false

placement.canPlace=false
mining.canMine=false

pathing.async=false
