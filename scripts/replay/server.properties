# Orebit world-REPLAY headless run (copied into run/replay/ by scripts/run-replay.ps1).
# This does NOT regenerate a world: scripts/run-replay.ps1 copies the owner's hand-built "Swims" save into
# run/replay/world/, and the server LOADS it (the stored level.dat drives the generator, so level-type here is
# only a fallback and is ignored for an existing world). level-name must match the copied folder (world).
level-name=world

# No real clients ever join; the bot is a server-side PlayerList member.
online-mode=false
white-list=false
max-players=4
motd=Orebit world replay

# Peaceful: no mobs to knock a bot off course (that would be a combat outcome, not a movement pathology).
difficulty=peaceful
gamemode=survival
force-gamemode=false
generate-structures=false

# The reproduced route (14,-56,1) -> (-3,-56,1) is a compact span near origin; 14 keeps it loaded + nav-built.
view-distance=14
simulation-distance=10
spawn-protection=0

# Watchdog OFF: a slow first-gen tick must never hard-kill the server mid-run (the harness owns its budget).
max-tick-time=-1
# The empty-server tick pause must never engage (the bot joins within the first tick).
pause-when-empty-seconds=-1

# Irrelevant-but-quiet defaults
enable-rcon=false
enable-status=false
snooper-enabled=false
spawn-npcs=false
spawn-animals=false
allow-nether=false
sync-chunk-writes=false
