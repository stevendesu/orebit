# Gradle daemon heap. The combined `chiseledBuild` runs all ~29 loaderĂ—version targets in
# one daemon, holding Loom state for every MC version at once â€” 2G GC-thrashed into a hang.
# 4G clears it. (Per-loader chiseledBuild{Fabric,Neoforge,Forge} run fine even at 2G.)
org.gradle.jvmargs=-Xmx4G
org.gradle.caching=true
# Architectury Loom remap tasks are not config-cache safe yet; keep it off.
org.gradle.configuration-cache=false

# Mod properties (version-agnostic)
mod.version=1.0.0
mod.group=com.orebit.mod
mod.id=orebit
mod.name=Orebit

# Loader-agnostic toolchain. fabric-loader >=0.17.3: recent fabric-api (1.21.11's
# fabric-api-base etc.) requires it at runtime; older MC's fabric-api is satisfied too
# (the loader is backward-compatible across MC versions).
deps.fabric_loader=0.17.3

# Per-Minecraft-version values (parchment, loader versions, and the mod.mc_dep_*
# ranges) live in versions/<mcver>/gradle.properties. The Architectury *API* is not
# used (loader glue is native events); only the Architectury Loom plugin is needed.
