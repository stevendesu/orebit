# Gradle daemon heap. The combined `chiseledBuild` runs all ~29 loaderĂ—version targets in
# one daemon, holding Loom state for every MC version at once â€” 2G GC-thrashed into a hang.
# 4G clears it. (Per-loader chiseledBuild{Fabric,Neoforge,Forge} run fine even at 2G.)
org.gradle.jvmargs=-Xmx4G
org.gradle.caching=true
# Architectury Loom remap tasks are not config-cache safe yet; keep it off.
org.gradle.configuration-cache=false

# Mod properties (version-agnostic)
mod.version=1.0.0
mod.group=com.orebit.mod
mod.id=orebit
mod.name=Orebit

# Loader-agnostic toolchain
deps.fabric_loader=0.16.13

# Per-Minecraft-version values (parchment, architectury_api, loader versions, and
# the mod.mc_dep_* ranges) live in versions/<mcver>/gradle.properties.
