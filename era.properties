# Era toolchain values (Model C — see internal_docs/BUILD-STRATEGY.md).
#
# This file is the ONE thing an era branch owns. It is INTENTIONALLY ABSENT on the
# `core` branch (which holds only version-portable logic and is not buildable); each
# era branch adds it in a single commit. `git merge core` into an era branch therefore
# never touches a toolchain value, so common fixes propagate conflict-free.
#
# Read by settings.gradle.kts (Loom plugin version + the Stonecutter version matrix).
# The Gradle wrapper version lives in gradle/wrapper/gradle-wrapper.properties (also
# era-owned by nature). The active dev version is the Stonecutter-managed marker in
# stonecutter.gradle.kts (set via `Set active project to <ver>`), not stored here.

era.name=mc-1.21

# Architectury Loom: 1.13.469 is the single version that builds the WHOLE 1.20.1->1.21.11
# matrix on Gradle 8.12.1 across Fabric + NeoForge + legacy Forge (see stonecutter.gradle.kts
# for the full rationale).
loom.version=1.13.469

# JDK that runs this era's Gradle build. (The per-version Java source/target LEVEL is
# derived from the MC version in the build scripts and stays on `core`.)
java.version=21

# Stonecutter version matrix for this era. Loader coverage policy is documented in
# settings.gradle.kts; these are just the version lists, sorted ascending. No version is
# special — 1.21.4 sits in its natural place.
mc.versions.common=1.20.1,1.20.2,1.20.3,1.20.4,1.20.5,1.20.6,1.21,1.21.1,1.21.2,1.21.3,1.21.4,1.21.5,1.21.6,1.21.7,1.21.8,1.21.9,1.21.10,1.21.11
mc.versions.fabric=1.20.1,1.20.2,1.20.3,1.20.4,1.20.5,1.20.6,1.21,1.21.1,1.21.2,1.21.3,1.21.4,1.21.5,1.21.6,1.21.7,1.21.8,1.21.9,1.21.10,1.21.11
mc.versions.neoforge=1.21,1.21.1,1.21.2,1.21.3,1.21.4,1.21.5,1.21.6,1.21.7,1.21.8,1.21.9,1.21.10,1.21.11
mc.versions.forge=1.20.1,1.20.2,1.20.4,1.20.6,1.21,1.21.1,1.21.3,1.21.4,1.21.5,1.21.6,1.21.7,1.21.8,1.21.9,1.21.10,1.21.11
