# Era toolchain values (Model C — see internal_docs/BUILD-STRATEGY.md).
#
# This file is the ONE thing an era branch owns. It is INTENTIONALLY ABSENT on the
# `core` branch (which holds only version-portable logic and is not buildable); each
# era branch adds it in a single commit. `git merge core` into an era branch therefore
# never touches a toolchain value, so common fixes propagate conflict-free.
#
# Read by settings.gradle.kts (Loom plugin version + the Stonecutter version matrix).
# The Gradle wrapper version lives in gradle/wrapper/gradle-wrapper.properties (also
# era-owned by nature). The active dev version is the Stonecutter-managed marker in
# stonecutter.gradle.kts (set via `Set active project to <ver>`), not stored here.

era.name=mc-26

# Architectury Loom: 1.17.487 is the current release (tracking Fabric Loom 1.17) — new
# enough to build MC 26.x, which Fabric's 26.1 porting guide pins at Loom >=1.15.
# This is a SEPARATE era from mc-1.21 (Loom 1.13.469 / Gradle 8.12.1) because 26.x needs
# Java 25 + Gradle 9 + a newer Loom, which cannot coexist with legacy Forge's <=1.13 /
# Gradle-8 constraints in one build (BUILD-STRATEGY §3).
loom.version=1.17.487

# JDK that runs this era's Gradle build. 26.x is the first MC requiring Java 25.
# (The per-version Java source/target LEVEL is derived from the MC version in the build
# scripts and stays on `core`: build.gradle.kts selects JDK 25 for >=26.)
java.version=25

# Stonecutter version matrix for this era (26.x), sorted ascending. Loader-coverage
# policy is documented in settings.gradle.kts; these are just the version lists.
#
# 26.1 is the first UNOBFUSCATED Minecraft: Yarn is dropped in favor of official Mojang
# mappings — which Orebit already uses, so the mappings setup is unchanged. NeoForge 26.x
# is beta-where-no-stable (26.1.2 promoted stable; the rest beta); Forge 26.x = 62/63/64/65.x;
# Fabric every version.
mc.versions.common=26.1,26.1.1,26.1.2,26.2
mc.versions.fabric=26.1,26.1.1,26.1.2,26.2
mc.versions.neoforge=26.1,26.1.1,26.1.2,26.2
mc.versions.forge=26.1,26.1.1,26.1.2,26.2
