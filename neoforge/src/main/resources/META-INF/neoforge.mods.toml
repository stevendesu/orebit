modLoader="javafml"
# Permissive floor: the `minecraft` dependency below pins the real version (and thus the
# matching NeoForge loader), so this need not be hardcoded per release.
loaderVersion="[1,)"
license="CC0-1.0"
issueTrackerURL="https://github.com/FabricMC/fabric-example-mod"

[[mods]]
modId="${id}"
version="${version}"
displayName="${name}"
authors="Me!"
description='''
This is an example description! Tell everyone what your mod is about!
'''
logoFile="assets/orebit/icon.png"

[[dependencies.${id}]]
modId="neoforge"
type="required"
# Permissive floor (NeoForge's earliest is 1.20.2 = 20.2). The `minecraft` range pins
# the exact version, which forces the matching NeoForge build.
versionRange="[20.2,)"
ordering="NONE"
side="BOTH"

[[dependencies.${id}]]
modId="minecraft"
type="required"
versionRange="${minecraft}"
ordering="NONE"
side="BOTH"
