modLoader="javafml"
loaderVersion="[${loader_major},)"
license="CC0-1.0"
issueTrackerURL="https://github.com/FabricMC/fabric-example-mod"

[[mods]]
modId="${id}"
version="${version}"
displayName="${name}"
authors="Me!"
description='''
This is an example description! Tell everyone what your mod is about!
'''
# No logoFile: Forge requires it to be a bare filename at the JAR ROOT (no "/"); a path like
# assets/orebit/icon.png throws "Root resources can only be filenames, not paths" and crashes the
# mod-list screen when the card is opened. To add a Forge logo later, place icon.png at the jar
# root and set logoFile="icon.png". (Fabric's fabric.mod.json "icon" accepts the assets/ path fine.)

# The project's one mixin (block-change hook). The config JSON is shadow-bundled from the
# common module's resources. NOTE: mods.toml [[mixins]] registration is honored by Forge 1.18+
# (Forge 38+); on 1.17.1 Forge it is ignored, so the hook is inert there — accepted, as Forge is
# build-only (runClient broken post-~1.20.4) and the hook is verified on Fabric/NeoForge.
[[mixins]]
config="orebit.mixins.json"

[[dependencies.${id}]]
modId="forge"
mandatory=true
versionRange="[${loader_major},)"
ordering="NONE"
side="BOTH"

[[dependencies.${id}]]
modId="minecraft"
mandatory=true
versionRange="${minecraft}"
ordering="NONE"
side="BOTH"
